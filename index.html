<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>For Esha ❤️</title>

  <!-- Google Font -->

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <!-- Floating Hearts -->

  <div class="hearts"></div>

  <!-- Music Toggle -->

  <button id="musicBtn">
    🎵
  </button>

  <!-- Background Music -->

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mp3">
  </audio>

  <!-- Intro Screen -->

  <section
    class="screen active"
    id="introScreen"
  >

    <div class="card intro-card">

      <h1>Hey Esha 💖</h1>

      <p class="typing">
        I made something special for you...
      </p>

      <button id="startBtn">
        Enter ✨
      </button>

    </div>

  </section>

  <!-- Proposal Screen -->

  <section
    class="screen"
    id="proposalScreen"
  >

    <div class="card proposal-card">

      <h1>
        Will you be my Valentine? 💘
      </h1>

      <p class="subtitle">
        My heart already said yes...
        now I just need yours.
      </p>

      <div class="buttons">

        <button
          class="yes-btn"
          id="yesBtn"
        >
          Yes 💖
        </button>

        <button
          class="no-btn"
          id="noBtn"
        >
          No 💔
        </button>

      </div>

    </div>

  </section>

  <!-- Final Screen -->

  <section
    class="screen"
    id="finalScreen"
  >

    <div class="card final-card">

      <h1>
        You just made me the happiest guy alive ❤️
      </h1>

      <p>
        Out of all the people in this world...
        I still choose you.
      </p>

      <div class="love">
        ❤️ ❤️ ❤️
      </div>

    </div>

  </section>

  <script src="script.js"></script>

</body>

</html>
